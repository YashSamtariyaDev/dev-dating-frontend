<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Connection Test</title>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        input, button { padding: 10px; margin: 5px; }
        button { cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 WebSocket Connection Test</h1>
        <p>Test if WebSocket is working from frontend (port 3001) to backend (port 3000 with SSL)</p>
        
        <div>
            <input type="text" id="token" placeholder="JWT Token" style="width: 400px;">
            <button onclick="testConnection()">Test Connection</button>
        </div>
        
        <div id="status" class="status info">Enter a token and click Test Connection</div>
        
        <div id="logs"></div>
    </div>
    
    <script>
        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            logs.appendChild(div);
        }
        
        function testConnection() {
            const token = document.getElementById('token').value.trim();
            const status = document.getElementById('status');
            
            if (!token) {
                status.className = 'status error';
                status.textContent = 'Please enter a JWT token';
                return;
            }
            
            status.className = 'status info';
            status.textContent = 'Testing connection...';
            
            addLog('Attempting to connect to wss://localhost:3000 (with SSL)', 'info');
            
            const socket = io('https://localhost:3000', {
                auth: { token },
                transports: ['websocket'],
                reconnection: false,
                rejectUnauthorized: false, // Ignore SSL certificate errors
            });
            
            socket.on('connect', () => {
                status.className = 'status success';
                status.textContent = '✅ Connected successfully!';
                addLog('Connected to WebSocket server', 'success');
                addLog(`Socket ID: ${socket.id}`, 'info');
                
                // Parse JWT to get user ID
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const userId = payload.sub;
                    addLog(`User ID from token: ${userId}`, 'info');
                    
                    // Test register
                    socket.emit('register', { userId: Number(userId) }, (response) => {
                        if (response?.success) {
                            addLog(`Registration successful: ${JSON.stringify(response)}`, 'success');
                        } else {
                            addLog(`Registration failed: ${JSON.stringify(response)}`, 'error');
                        }
                    });
                    
                    // Test join room
                    socket.emit('joinRoom', { chatRoomId: 5 }, (response) => {
                        if (response?.success) {
                            addLog(`Joined room successfully: ${JSON.stringify(response)}`, 'success');
                        } else {
                            addLog(`Failed to join room: ${JSON.stringify(response)}`, 'error');
                        }
                    });
                } catch (e) {
                    addLog('Failed to parse token', 'error');
                }
                
                // Disconnect after tests
                setTimeout(() => {
                    socket.disconnect();
                    addLog('Disconnected after test', 'info');
                }, 3000);
            });
            
            socket.on('disconnect', () => {
                addLog('Disconnected from server', 'info');
            });
            
            socket.on('connect_error', (error) => {
                status.className = 'status error';
                status.textContent = '❌ Connection failed';
                addLog(`Connection error: ${error.message}`, 'error');
                addLog('Check if backend is running with WebSocket support', 'error');
            });
        }
        
        // Try to get token from localStorage if available
        window.onload = function() {
            const token = localStorage.getItem('auth_token');
            if (token) {
                document.getElementById('token').value = token;
                addLog('Token loaded from localStorage', 'success');
            }
        };
    </script>
</body>
</html>
